<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADCMS — Stores & Inventory</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .stores-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .btn-add { background: #5f2bbd; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .search-box { width: 100%; padding: 12px; margin-bottom: 20px; background: #1e1e3f; border: 1px solid #333; color: white; border-radius: 8px; }
    .stores-table { width: 100%; border-collapse: collapse; background: #1e1e3f; border-radius: 8px; overflow: hidden; }
    .stores-table th, .stores-table td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
    .stores-table th { background: #29135e; font-size: 12px; text-transform: uppercase; }
    .qty-badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; }
    .qty-low { background: #ff5252; color: white; }
    .qty-ok { background: #4caf50; color: white; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: #171036; padding: 30px; border-radius: 12px; width: 400px; border: 1px solid #5f2bbd; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #aaa; }
    .form-group input, .form-group select { width: 100%; padding: 10px; background: #0b061a; border: 1px solid #333; color: white; border-radius: 4px; }
    .btn-save { background: #4caf50; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    .btn-cancel { background: #444; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; margin-top: 10px; }
    .btn-delete { background: #ff5252; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-logo-container">
          <img src="assets/img/logo.png" alt="Sky Vision Airlines" class="company-logo">
          <div class="brand-credits">
            <span class="designer">Designed by: Eng. Hany Omar</span>
            <span class="reviewer">Reviewed by: Eng. Akram El-Gendy</span>
          </div>
        </div>
      </div>
      <nav>
        <a href="index.html">⌂ <span>Fleet Overview</span></a>
        <a href="dashboard.html">◫ <span>Dashboard</span></a>
        <a href="defect-control.html">▱ <span>Defect Control</span></a>
        <a class="active" href="stores.html">📦 <span>Stores & Inventory</span></a>
        <a href="mcc-center.html">🎛️ <span>MCC Center</span></a>
      </nav>
    </aside>

    <main>
      <header>
        <button class="menu" id="menuBtn" style="display: block !important;">☰</button>
        <div class="profile"><div class="avatar">H</div><div><strong>Hany Omar</strong><small>Super Admin</small></div></div>
      </header>

      <section class="content">
        <div class="stores-header">
          <h2>📦 Stores & Inventory</h2>
          <button class="btn-add" onclick="ADCMSStores.openAddModal()">+ Add New Part</button>
        </div>

        <input type="text" id="searchParts" class="search-box" placeholder="Search by Part Number or Description..." onkeyup="ADCMSStores.filterTable()">

        <table class="stores-table">
          <thead>
            <tr>
              <th>Part Number</th>
              <th>Description</th>
              <th>Location</th>
              <th>Qty</th>
              <th>Unit</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="storesTableBody"></tbody>
        </table>

        <!-- Add Modal -->
        <div id="addPartModal" class="modal">
          <div class="modal-content">
            <h3>Add New Part</h3>
            <div class="form-group"><label>Part Number</label><input type="text" id="pNumber"></div>
            <div class="form-group"><label>Description</label><input type="text" id="pDesc"></div>
            <div class="form-group"><label>Location</label><select id="pLoc"><option>CAI</option><option>HRG</option><option>SSH</option></select></div>
            <div class="form-group"><label>Quantity</label><input type="number" id="pQty"></div>
            <div class="form-group"><label>Unit</label><select id="pUnit"><option>Piece</option><option>Set</option></select></div>
            <button class="btn-save" onclick="ADCMSStores.submitPart()">Save Part</button>
            <button class="btn-cancel" onclick="ADCMSStores.closeAddModal()">Cancel</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="modules/data.js"></script>
  <script src="modules/ui.js"></script>
  <script src="modules/stores.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => { if(window.ADCMSStores) window.ADCMSStores.init(); }, 500);
    });
  </script>
</body>
</html>

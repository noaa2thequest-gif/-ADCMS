<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADCMS — Defect Control</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-logo-container">
          <img src="assets/img/logo.png" alt="Sky Vision Airlines" class="company-logo">
          <div class="brand-credits">
            <span class="designer">Designed by: Eng. Hany Omar</span>
            <span class="reviewer">Reviewed by: Eng. Akram El-Gendy</span>
          </div>
        </div>
      </div>
      <nav>
        <a href="index.html">⌂ <span>Fleet Overview</span></a>
        <a href="dashboard.html">◫ <span>Dashboard</span></a>
        <a class="active" href="defect-control.html">▱ <span>Defect Control</span></a>
        <a href="stores.html">📦 <span>Stores & Inventory</span></a>
        <a href="mcc-center.html">🎛️ <span>MCC Center</span></a>
      </nav>
    </aside>

    <main>
      <header>
        <button class="menu" id="menuBtn" style="display: block !important;">☰</button>
        <div class="profile"><div class="avatar">H</div><div><strong>Hany Omar</strong><small>Super Admin</small></div></div>
      </header>

      <section class="content">
        <div class="section-head">
          <h2>▱ Defect Control Panel</h2>
          <span id="defectCountBadge" class="workflow-badge">0 open</span>
        </div>
        
        <div id="defectControlList" class="defect-list" style="margin-top: 20px;">
          <p style="text-align: center; padding: 40px; color: #888;">Loading defects...</p>
        </div>
      </section>
    </main>
  </div>

  <script src="modules/data.js"></script>
  <script src="modules/ui.js"></script>
  <script src="modules/workflow.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => { if(window.ADCMSWorkflow) window.ADCMSWorkflow.init(); }, 500);
    });
  </script>
</body>
</html>

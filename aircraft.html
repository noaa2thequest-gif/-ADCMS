<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADCMS — Aircraft Fleet</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-logo-container">
          <img src="assets/img/logo.png" alt="Sky Vision Airlines" class="company-logo">
          <div class="brand-credits">
            <span class="designer">Designed by: Eng. Hany Omar</span>
            <span class="reviewer">Reviewed by: Eng. Akram El-Gendy</span>
          </div>
        </div>
      </div>
      <nav id="mainNav"></nav>
    </aside>

    <main>
      <header>
        <button class="menu" id="menuBtn">☰</button>
        <div class="profile"><div class="avatar">H</div><div><strong>Hany Omar</strong><small>Super Admin</small></div></div>
      </header>

      <section class="content">
        <div class="title-row">
          <h2>Aircraft Fleet</h2>
          <div class="title-actions">
            <input id="search" placeholder="Search by Registration or Model..." style="width: 300px;" />
          </div>
        </div>
        <div class="aircraft-grid" id="aircraftGrid"></div>
      </section>
    </main>
  </div>

  <script src="modules/data.js"></script>
  <script src="modules/ui.js"></script>
  <script src="modules/dashboard.js"></script>
  <script src="app.js"></script>
</body>
</html>
